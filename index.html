<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Pembayaran</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 35px;
            position: relative;
            overflow: hidden;
        }

        .payment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #25D366, #34B7F1);
        }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-header h2 {
            color: #1a202c;
            font-size: 24px;
            font-weight: 600;
        }

        .card-header p {
            color: #718096;
            margin-top: 5px;
        }

        .payment-method {
            margin-bottom: 25px;
            padding: 20px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .payment-method:hover {
            border-color: #34B7F1;
            background-color: #f7fafc;
        }

        .method-title {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .method-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
        }

        .no-dana .method-icon {
            background-color: #25D366;
        }

        .gopay .method-icon {
            background-color: #34B7F1;
        }

        .method-icon img {
            width: 22px;
            height: 22px;
        }

        .method-title h3 {
            color: #2d3748;
            font-size: 18px;
            font-weight: 500;
        }

        .payment-details {
            margin-left: 55px;
            display: flex;
            align-items: center;
            padding: 8px 0;
            background-color: #f7fafc;
            border-radius: 8px;
            padding-left: 15px;
        }

        .payment-details span {
            color: #4a5568;
            font-size: 16px;
        }

        .copy-btn {
            margin-left: auto;
            margin-right: 15px;
            padding: 6px 12px;
            background-color: #edf2f7;
            border: none;
            border-radius: 6px;
            color: #4a5568;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .copy-btn:hover {
            background-color: #e2e8f0;
        }

        .note {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            background-color: #fff5f5;
            border-radius: 10px;
        }

        .note p {
            color: #c53030;
            font-size: 14px;
        }

        /* Ikon placeholder jika gambar tidak tersedia */
        .icon-placeholder {
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="card-header">
            <h2>PEMBAYARAN</h2>
            <p>Silakan transfer ke salah satu rekening di bawah</p>
        </div>

        <!-- Metode No Dana -->
        <div class="payment-method no-dana">
            <div class="method-title">
                <div class="method-icon">
                    <!-- Ganti dengan gambar ikon No Dana jika ada, jika tidak gunakan placeholder -->
                    <span class="icon-placeholder">ND</span>
                </div>
                <h3>NO DANA</h3>
            </div>
            <div class="payment-details">
                <span>083124891291</span>
                <button class="copy-btn" onclick="copyToClipboard('083124891291')">Salin</button>
            </div>
        </div>

        <!-- Metode Gopay -->
        <div class="payment-method gopay">
            <div class="method-title">
                <div class="method-icon">
                    <!-- Ganti dengan gambar ikon Gopay jika ada, jika tidak gunakan placeholder -->
                    <span class="icon-placeholder">GP</span>
                </div>
                <h3>GOPAY</h3>
            </div>
            <div class="payment-details">
                <span>083124891291</span>
                <button class="copy-btn" onclick="copyToClipboard('083124891291')">Salin</button>
            </div>
        </div>

        <div class="note">
            <p><strong>CATATAN:</strong> Nama Rekening Tidak Ada - Silakan pastikan nomor tujuan benar sebelum mentransfer</p>
        </div>
    </div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Nomor berhasil disalin ke clipboard!');
            }).catch(err => {
                alert('Gagal menyalin nomor: ', err);
            });
        }
    </script>
</body>
</html>
